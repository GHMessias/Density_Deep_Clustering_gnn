run:
  experiment: node_feature_clustering
  seed: 42
dataset:
  loader: planetoid
  name: Cora
  root: data/raw
algorithm:
  name: gae_kmeans_embeddings
  params:
    n_clusters: 2
    encoder_hidden_channels: 128
    embedding_channels: 32
    epochs: 200
    learning_rate: 0.005
    weight_decay: 0.0
    dropout: 0.0
    device: auto
    n_init: 20
    max_iter: 300
    scale_embeddings: true
output:
  dir: results/real_scenario_benchmark/real_scenario_gae_kmeans_k2
  save_assignments: true
  save_features: true
