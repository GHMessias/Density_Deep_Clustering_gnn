run:
  experiment: node_feature_clustering
  seed: 42

dataset:
  loader: planetoid
  name: CiteSeer
  root: data/raw

algorithm:
  name: arga_kmeans_embeddings
  params:
    n_clusters: auto
    encoder_hidden_channels: 128
    embedding_channels: 32
    discriminator_hidden_channels: 64
    epochs: 200
    learning_rate: 0.005
    discriminator_learning_rate: 0.001
    weight_decay: 0.0
    dropout: 0.0
    reg_loss_weight: 1.0
    discriminator_steps: 1
    device: auto
    n_init: 20
    max_iter: 300
    scale_embeddings: true

output:
  dir: results/final_inputs/cora/arga_kmeans
  save_assignments: true
  save_features: true
