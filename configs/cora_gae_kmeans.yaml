run:
  experiment: node_feature_clustering
  seed: 42

dataset:
  loader: planetoid
  name: Cora
  root: data/raw

algorithm:
  name: gae_kmeans_embeddings
  params:
    n_clusters: auto
    encoder_hidden_channels: 128
    embedding_channels: 32
    epochs: 200
    learning_rate: 0.01
    weight_decay: 0.0
    dropout: 0.0
    device: cuda
    n_init: 20
    max_iter: 300
    scale_embeddings: true

output:
  dir: results/cora/gae_kmeans
  save_assignments: true
