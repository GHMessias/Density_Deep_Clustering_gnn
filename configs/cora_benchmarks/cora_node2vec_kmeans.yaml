run:
  experiment: node_feature_clustering
  seed: 42

dataset:
  loader: planetoid
  name: Cora
  root: data/raw

algorithm:
  name: node2vec_kmeans_embeddings
  params:
    n_clusters: auto
    embedding_channels: 32
    walk_length: 20
    context_size: 10
    walks_per_node: 10
    num_negative_samples: 1
    p: 1.0
    q: 1.0
    sparse: true
    epochs: 200
    batch_size: 128
    learning_rate: 0.01
    num_workers: 0
    device: auto
    n_init: 20
    max_iter: 300
    scale_embeddings: true

output:
  dir: results/final_inputs/cora/node2vec_kmeans_embeddings
  save_assignments: true
  save_features: true
